name: Test Linux x86_64 v2-v3

on:
  push:
    branches:
      - ci/linux-amd64v3-test
      - personal/stable
  workflow_dispatch:

concurrency:
  group: test-linux-x86_64-v2-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goamd64: v2
            output_name: daed-linux-x86_64_v2_sse
          - goamd64: v3
            output_name: daed-linux-x86_64_v3_avx2
    env:
      GOOS: linux
      GOARCH: amd64
      GOAMD64: ${{ matrix.goamd64 }}
      CGO_ENABLED: 0

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v5.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Build web
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          pnpm install
          pnpm build --filter daed

      - name: Build bundle
        env:
          VERSION: test-${{ github.sha }}
          GOFLAGS: -trimpath -mod=mod -modcacherw
          OUTPUT: ../bundled/${{ matrix.output_name }}
          APPNAME: daed
          WEB_DIST: ../apps/web/dist
        working-directory: wing
        run: make bundle

      - name: Smoke test
        run: ./bundled/${{ matrix.output_name }} --version

      - name: Collect runtime files
        run: |
          mkdir -p artifact
          cp bundled/${{ matrix.output_name }} artifact/daed
          cp install/daed.service artifact/
          cp install/daed.desktop artifact/
          cp -r install/icons artifact/icons
          curl -L -o artifact/geoip.dat https://github.com/v2rayA/dist-v2ray-rules-dat/raw/master/geoip.dat
          curl -L -o artifact/geosite.dat https://github.com/v2rayA/dist-v2ray-rules-dat/raw/master/geosite.dat
          tar -C artifact -czf ${{ matrix.output_name }}-test.tar.gz .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output_name }}-test
          path: |
            artifact/**
            ${{ matrix.output_name }}-test.tar.gz
