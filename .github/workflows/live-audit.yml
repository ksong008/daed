name: Integration Live Audit

on:
  workflow_dispatch:
  workflow_call:

jobs:
  integration-live-audit:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.3'
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Firefox
        run: npx playwright install --with-deps firefox

      - name: Run integration live audit
        env:
          DAEWING_DIR: ${{ github.workspace }}/wing
          GO_BIN: go
          PNPM_BIN: pnpm
          AUDIT_ARTIFACT_DIR: ${{ runner.temp }}/live-audit-artifacts
        run: pnpm test:integration

      - name: Upload live audit artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: live-audit-artifacts
          path: ${{ runner.temp }}/live-audit-artifacts/**
          if-no-files-found: ignore
